<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | bezdzenariy</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <!-- SHOWS VIEW -->
    <div id="shows-view">
      <h1>TV Shows</h1>
      <input type="text" id="showSearch" placeholder="Search shows by name, genre, or summary..." />
      <div id="shows-container"></div>
    </div>

    <!-- EPISODES VIEW -->
    <div id="episodes-view" style="display: none;">
      <button id="back-btn">← Back to shows</button>

      <div id="controls">
        <input type="text" id="searchInput" placeholder="Search episodes..." />
        <select id="episodeSelector">
          <option value="">Select an episode...</option>
        </select>
        <p id="matchCount"></p>
      </div>

      <div id="root"></div>
    </div>

    <footer>
      <p>Data from <a href="https://tvmaze.com/">TVMaze.com</a></p>
    </footer>

    <!-- Loads YOUR javascript code -->
    <script src="script.js"></script>
  </body>
</html>
